data:
  references_dir: data/references
  production_dir: data/production
  outputs_dir: outputs
  target_id: null

segmenter:
  name: fallback
  min_area_ratio: 0.002
  max_area_ratio: 0.65
  max_candidates: 80
  grid_proposals: true
  grid_sizes: [2, 3, 4]

matcher:
  embedding_model: color_hist
  reference_crop_mode: full_image
  score_aggregation: topk_average
  top_k: 3
  threshold: 0.72
  histogram_bins: [8, 8, 8]
  nms_iou_threshold: 0.55

output:
  save_candidate_crops: true
  save_rejected_debug: false
  mask_alpha: 0.45
